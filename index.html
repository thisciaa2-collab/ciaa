<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciaa - EL DURO | Official Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script>
        function detectAndRedirect() {
            const userLang = navigator.language || navigator.userLanguage;
            // Si el usuario ya eligió manualmente antes o si detectamos español, va a /es/
            if (userLang.startsWith('es')) {
                window.location.href = './es/';
            } else {
                window.location.href = './en/';
            }
        }
        
        // Ejecutar detección rápida inmediatamente
        detectAndRedirect();
    </script>
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen flex flex-col justify-center items-center overflow-hidden relative">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f0f15_1px,transparent_1px),linear-gradient(to_bottom,#0f0f15_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="relative z-10 max-w-md w-full px-6 text-center">
        <h1 class="font-poppins text-4xl md:text-5xl font-black tracking-wider mb-2 bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
            CIAA
        </h1>
        <p class="text-xs uppercase tracking-[0.3em] text-zinc-500 font-semibold mb-12">EL DURO</p>
        
        <div class="bg-zinc-900/60 backdrop-blur-xl border border-zinc-800 p-8 rounded-2xl shadow-2xl space-y-4">
            <p class="text-sm text-zinc-400 mb-6">Select your language / Selecciona tu idioma</p>
            
            <a href="./es/" class="block w-full py-4 px-6 bg-zinc-800 hover:bg-emerald-500 hover:text-black font-bold uppercase tracking-wider text-sm rounded-xl transition-all duration-300 border border-zinc-700/50 hover:border-emerald-400 hover:shadow-[0_0_25px_rgba(16,185,129,0.3)]">
                Español
            </a>
            
            <a href="./en/" class="block w-full py-4 px-6 bg-zinc-800 hover:bg-cyan-400 hover:text-black font-bold uppercase tracking-wider text-sm rounded-xl transition-all duration-300 border border-zinc-700/50 hover:border-cyan-300 hover:shadow-[0_0_25px_rgba(34,211,238,0.3)]">
                English
            </a>
        </div>
    </div>

    <footer class="absolute bottom-6 left-0 right-0 text-center text-[10px] uppercase tracking-[0.2em] text-zinc-600">
        &copy; 2026 EL DURO. All rights reserved.
    </footer>
</body>
</html>
